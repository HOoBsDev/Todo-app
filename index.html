<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Todo app</title>
</head>

<body>
    <div class="container">
        <h1>Todo App</h1>
        <hr />
        <h2>Form</h2>
        <form>
            <label>Title :</label>
            <input id="title" type="text" name="title" placeholder="type any things"/>
            <label>Details :</label>
            <textarea id="details" name="details" placeholder="type details here"></textarea>
            <submit onclick="addTodo()">Add</submit>
        </form>
        <hr />
        <h2>List</h2>
        <ul id="list">
        </ul>
    </div>
    <script src="script.js"></script>
</body>

</html>
